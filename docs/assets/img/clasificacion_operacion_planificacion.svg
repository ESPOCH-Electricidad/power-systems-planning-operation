<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#ffffff"/>
  <text x="600" y="52" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#0b1f3a">Clasificación de modelos en operación y planificación</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="100" y="100" width="470" height="420" rx="24" fill="#eef7ff" stroke="#2b6cb0" stroke-width="3"/>
    <text x="335" y="145" text-anchor="middle" font-size="28" font-weight="700" fill="#1d4e89">Operación</text>
    <text x="335" y="177" text-anchor="middle" font-size="17" fill="#1d4e89">Decisiones de corto plazo</text>
    <g font-size="20" fill="#0b1f3a">
      <rect x="150" y="220" width="370" height="54" rx="12" fill="#ffffff" stroke="#8ecae6"/>
      <text x="335" y="254" text-anchor="middle">Despacho económico (ED)</text>
      <rect x="150" y="292" width="370" height="54" rx="12" fill="#ffffff" stroke="#8ecae6"/>
      <text x="335" y="326" text-anchor="middle">Compromiso de unidades (UC)</text>
      <rect x="150" y="364" width="370" height="54" rx="12" fill="#ffffff" stroke="#8ecae6"/>
      <text x="335" y="398" text-anchor="middle">Flujo óptimo de potencia (OPF)</text>
      <rect x="150" y="436" width="370" height="54" rx="12" fill="#ffffff" stroke="#8ecae6"/>
      <text x="335" y="470" text-anchor="middle">Coordinación hidrotérmica</text>
    </g>
    <rect x="630" y="100" width="470" height="420" rx="24" fill="#fff6eb" stroke="#d97706" stroke-width="3"/>
    <text x="865" y="145" text-anchor="middle" font-size="28" font-weight="700" fill="#a85d00">Planificación</text>
    <text x="865" y="177" text-anchor="middle" font-size="17" fill="#a85d00">Decisiones de mediano y largo plazo</text>
    <g font-size="20" fill="#0b1f3a">
      <rect x="680" y="220" width="370" height="54" rx="12" fill="#ffffff" stroke="#f4a261"/>
      <text x="865" y="254" text-anchor="middle">Proyección de demanda</text>
      <rect x="680" y="292" width="370" height="54" rx="12" fill="#ffffff" stroke="#f4a261"/>
      <text x="865" y="326" text-anchor="middle">Expansión de transmisión (TNEP)</text>
      <rect x="680" y="364" width="370" height="54" rx="12" fill="#ffffff" stroke="#f4a261"/>
      <text x="865" y="398" text-anchor="middle">Expansión de generación (GEP)</text>
      <rect x="680" y="436" width="370" height="54" rx="12" fill="#ffffff" stroke="#f4a261"/>
      <text x="865" y="470" text-anchor="middle">Escenarios, confiabilidad y costo</text>
    </g>
    <path d="M570 310 C600 280 600 280 630 310" fill="none" stroke="#0b1f3a" stroke-width="3" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0b1f3a" />
    </marker>
  </defs>
</svg>
