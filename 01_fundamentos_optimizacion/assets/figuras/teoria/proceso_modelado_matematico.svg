<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="645" viewBox="0 0 1280 645">
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="70" y="52" font-family="Arial" font-size="34" font-weight="bold" fill="#0f172a">Proceso de modelado matemático</text>
<text x="70" y="86" font-family="Arial" font-size="19" fill="#475569">Preguntas que convierten un problema real en un modelo optimizable</text>
<rect x="70" y="120" width="1140" height="64" rx="15" fill="#dbeafe" stroke="#334155" stroke-width="2"/><text x="105" y="146" font-family="Arial" font-size="21" font-weight="bold" fill="#0f172a">1. Alternativas de decisión</text><text x="105" y="171" font-family="Arial" font-size="16" fill="#334155">¿Qué puede decidir el operador, planificador o diseñador?</text><line x1="640" y1="184" x2="640" y2="208" stroke="#475569" stroke-width="3"/><polygon points="630,204 650,204 640,216" fill="#475569"/><rect x="70" y="216" width="1140" height="64" rx="15" fill="#dcfce7" stroke="#334155" stroke-width="2"/><text x="105" y="242" font-family="Arial" font-size="21" font-weight="bold" fill="#0f172a">2. Criterio objetivo</text><text x="105" y="267" font-family="Arial" font-size="16" fill="#334155">¿Qué significa mejor: menor costo, mayor beneficio o menor inversión?</text><line x1="640" y1="280" x2="640" y2="304" stroke="#475569" stroke-width="3"/><polygon points="630,300 650,300 640,312" fill="#475569"/><rect x="70" y="312" width="1140" height="64" rx="15" fill="#fef3c7" stroke="#334155" stroke-width="2"/><text x="105" y="338" font-family="Arial" font-size="21" font-weight="bold" fill="#0f172a">3. Restricciones</text><text x="105" y="363" font-family="Arial" font-size="16" fill="#334155">¿Qué límites técnicos, económicos o físicos deben cumplirse?</text><line x1="640" y1="376" x2="640" y2="400" stroke="#475569" stroke-width="3"/><polygon points="630,396 650,396 640,408" fill="#475569"/><rect x="70" y="408" width="1140" height="64" rx="15" fill="#fce7f3" stroke="#334155" stroke-width="2"/><text x="105" y="434" font-family="Arial" font-size="21" font-weight="bold" fill="#0f172a">4. Formulación</text><text x="105" y="459" font-family="Arial" font-size="16" fill="#334155">Conjuntos, parámetros, variables, objetivo y restricciones</text><line x1="640" y1="472" x2="640" y2="496" stroke="#475569" stroke-width="3"/><polygon points="630,492 650,492 640,504" fill="#475569"/><rect x="70" y="504" width="1140" height="64" rx="15" fill="#ede9fe" stroke="#334155" stroke-width="2"/><text x="105" y="530" font-family="Arial" font-size="21" font-weight="bold" fill="#0f172a">5. Solución e interpretación</text><text x="105" y="555" font-family="Arial" font-size="16" fill="#334155">Validar factibilidad, optimalidad, sensibilidad y significado técnico</text>
</svg>