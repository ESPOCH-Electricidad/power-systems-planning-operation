<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="460" viewBox="0 0 1280 460"><rect width="100%" height="100%" fill="#ffffff"/><text x="60" y="52" font-family="Arial" font-size="34" font-weight="bold" fill="#0f172a">Comparación entre PL, MILP, NLP y MINLP</text><text x="60" y="86" font-family="Arial" font-size="19" fill="#475569">La complejidad depende de las variables y ecuaciones</text><rect x="60" y="125" width="1160" height="58" fill="#0f172a"/><text x="76.0" y="161" font-family="Arial" font-size="16" font-weight="bold" fill="#fff">Tipo</text><line x1="60.0" y1="125" x2="60.0" y2="415" stroke="#cbd5e1"/><text x="366.0" y="161" font-family="Arial" font-size="16" font-weight="bold" fill="#fff">Variables</text><line x1="350.0" y1="125" x2="350.0" y2="415" stroke="#cbd5e1"/><text x="656.0" y="161" font-family="Arial" font-size="16" font-weight="bold" fill="#fff">Ecuaciones</text><line x1="640.0" y1="125" x2="640.0" y2="415" stroke="#cbd5e1"/><text x="946.0" y="161" font-family="Arial" font-size="16" font-weight="bold" fill="#fff">Ejemplo SEP</text><line x1="930.0" y1="125" x2="930.0" y2="415" stroke="#cbd5e1"/><line x1="1220" y1="125" x2="1220" y2="415" stroke="#cbd5e1"/><rect x="60" y="183" width="1160" height="58" fill="#f8fafc" stroke="#e2e8f0"/><text x="76.0" y="218" font-family="Arial" font-size="15" fill="#334155">PL / LP</text><text x="366.0" y="218" font-family="Arial" font-size="15" fill="#334155">continuas</text><text x="656.0" y="218" font-family="Arial" font-size="15" fill="#334155">lineales</text><text x="946.0" y="218" font-family="Arial" font-size="15" fill="#334155">despacho económico lineal</text><rect x="60" y="241" width="1160" height="58" fill="#ffffff" stroke="#e2e8f0"/><text x="76.0" y="276" font-family="Arial" font-size="15" fill="#334155">MILP</text><text x="366.0" y="276" font-family="Arial" font-size="15" fill="#334155">continuas + binarias</text><text x="656.0" y="276" font-family="Arial" font-size="15" fill="#334155">lineales</text><text x="946.0" y="276" font-family="Arial" font-size="15" fill="#334155">UC, TNEP, GEP discreto</text><rect x="60" y="299" width="1160" height="58" fill="#f8fafc" stroke="#e2e8f0"/><text x="76.0" y="334" font-family="Arial" font-size="15" fill="#334155">NLP</text><text x="366.0" y="334" font-family="Arial" font-size="15" fill="#334155">continuas</text><text x="656.0" y="334" font-family="Arial" font-size="15" fill="#334155">no lineales</text><text x="946.0" y="334" font-family="Arial" font-size="15" fill="#334155">OPF-AC</text><rect x="60" y="357" width="1160" height="58" fill="#ffffff" stroke="#e2e8f0"/><text x="76.0" y="392" font-family="Arial" font-size="15" fill="#334155">MINLP</text><text x="366.0" y="392" font-family="Arial" font-size="15" fill="#334155">continuas + binarias</text><text x="656.0" y="392" font-family="Arial" font-size="15" fill="#334155">no lineales</text><text x="946.0" y="392" font-family="Arial" font-size="15" fill="#334155">expansión con AC</text></svg>