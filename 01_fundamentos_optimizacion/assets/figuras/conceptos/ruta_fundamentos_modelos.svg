<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="615" viewBox="0 0 1300 615"><rect width="100%" height="100%" fill="#ffffff"/><text x="70" y="52" font-family="Arial" font-size="34" font-weight="bold" fill="#0f172a">Ruta didáctica de fundamentos de optimización</text><text x="70" y="84" font-family="Arial" font-size="18" fill="#475569">Primero se estudia teoría general, luego modelos pequeños, luego actividades alternativas</text><rect x="70" y="115" width="1160" height="62" rx="16" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/><text x="105" y="140" font-family="Arial" font-size="20" font-weight="bold" fill="#0f172a">1. Optimización</text><text x="105" y="165" font-family="Arial" font-size="16" fill="#334155">Decisiones, objetivo, restricciones, factibilidad y optimalidad</text><line x1="650" y1="177" x2="650" y2="199" stroke="#475569" stroke-width="3"/><polygon points="640,195 660,195 650,207" fill="#475569"/><rect x="70" y="207" width="1160" height="62" rx="16" fill="#dcfce7" stroke="#1e3a8a" stroke-width="2"/><text x="105" y="232" font-family="Arial" font-size="20" font-weight="bold" fill="#0f172a">2. Programación lineal</text><text x="105" y="257" font-family="Arial" font-size="16" fill="#334155">Variables continuas, relaciones lineales y región factible</text><line x1="650" y1="269" x2="650" y2="291" stroke="#475569" stroke-width="3"/><polygon points="640,287 660,287 650,299" fill="#475569"/><rect x="70" y="299" width="1160" height="62" rx="16" fill="#fef3c7" stroke="#1e3a8a" stroke-width="2"/><text x="105" y="324" font-family="Arial" font-size="20" font-weight="bold" fill="#0f172a">3. Programación entera mixta</text><text x="105" y="349" font-family="Arial" font-size="16" fill="#334155">Variables binarias para decisiones de instalación, encendido o selección</text><line x1="650" y1="361" x2="650" y2="383" stroke="#475569" stroke-width="3"/><polygon points="640,379 660,379 650,391" fill="#475569"/><rect x="70" y="391" width="1160" height="62" rx="16" fill="#fce7f3" stroke="#1e3a8a" stroke-width="2"/><text x="105" y="416" font-family="Arial" font-size="20" font-weight="bold" fill="#0f172a">4. Modelos de ejemplo</text><text x="105" y="441" font-family="Arial" font-size="16" fill="#334155">Producción, transporte, cobertura y forma matricial</text><line x1="650" y1="453" x2="650" y2="475" stroke="#475569" stroke-width="3"/><polygon points="640,471 660,471 650,483" fill="#475569"/><rect x="70" y="483" width="1160" height="62" rx="16" fill="#ede9fe" stroke="#1e3a8a" stroke-width="2"/><text x="105" y="508" font-family="Arial" font-size="20" font-weight="bold" fill="#0f172a">5. Actividades alternativas</text><text x="105" y="533" font-family="Arial" font-size="16" fill="#334155">Tres ejercicios progresivos para formular, implementar y analizar</text></svg>